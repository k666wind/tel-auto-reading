<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoLogReader</title>
  <meta name="description" content="Tel-Auto log viewer"/>
  <meta name="theme-color" content="#f5e6f0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="AutoLogReader"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:    #f5e6f0;
      --peach:   #fdf0e8;
      --mint:    #e8f5f0;
      --sky:     #e8f0f5;
      --lavender:#ede8f5;
      --butter:  #f5f3e8;

      --rose-mid:    #e8c5d8;
      --peach-mid:   #f5d5b8;
      --mint-mid:    #b8e0d0;
      --sky-mid:     #b8d0e8;
      --lavender-mid:#c8b8e8;
      --butter-mid:  #e0d8a8;

      --rose-deep:    #c0608c;
      --peach-deep:   #c07840;
      --mint-deep:    #3a9070;
      --sky-deep:     #4070a0;
      --lavender-deep:#6048a0;
      --red-alert:    #f8d8d8;
      --red-alert-border: #e89090;
      --red-alert-text:   #a03030;
      --green-alert:  #d8f0e0;
      --green-alert-border: #80c890;
      --green-alert-text:   #287048;

      --text:      #3a3040;
      --text-muted:#7a7088;
      --text-light:#a898b8;
      --surface:   #fffcfe;
      --border:    rgba(160,130,180,0.18);
      --shadow:    rgba(180,140,200,0.13);
      --radius:    14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--rose) 0%, var(--lavender) 40%, var(--sky) 100%);
      min-height: 100vh;
      color: var(--text);
      padding-bottom: 2rem;
    }

    /* ── Header ── */
    header {
      background: rgba(255,252,254,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 1rem;
    }

    .app-title {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--lavender-deep);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .app-title span { font-style: italic; color: var(--rose-deep); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      justify-content: flex-end;
    }

    /* ── Global search ── */
    .global-search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .global-search-wrap svg {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.4;
    }

    #globalSearch {
      width: 100%;
      background: rgba(237,232,245,0.6);
      border: 1.5px solid transparent;
      border-radius: 20px;
      color: var(--text);
      padding: 0.38rem 0.75rem 0.38rem 2rem;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #globalSearch:focus {
      border-color: var(--lavender-deep);
      background: white;
    }

    #globalSearch::placeholder { color: var(--text-light); }

    .header-status {
      font-size: 0.72rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mint-mid);
    }
    .dot.loading { background: var(--butter-mid); animation: pulse 1s infinite; }
    .dot.error   { background: var(--red-alert-border); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Main layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 1rem 0;
    }

    /* ── Setup card ── */
    .setup-card {
      background: rgba(255,252,254,0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 480px;
      margin: 3rem auto;
      box-shadow: 0 4px 32px var(--shadow);
      animation: fadeUp 0.4s ease;
    }

    .setup-card h2 {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--lavender-deep);
      margin-bottom: 0.4rem;
    }

    .setup-card p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .field-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }

    input[type=text], input[type=password] {
      width: 100%;
      background: var(--lavender);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1rem;
    }

    input[type=text]:focus, input[type=password]:focus {
      border-color: var(--lavender-deep);
      background: white;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--lavender-deep), var(--rose-deep));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.7rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── File tabs ── */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .tab {
      padding: 0.45rem 1rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: rgba(255,252,254,0.7);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover { background: rgba(255,252,254,0.95); color: var(--text); }

    .tab.active {
      background: white;
      border-color: var(--lavender-deep);
      color: var(--lavender-deep);
      box-shadow: 0 2px 12px var(--shadow);
    }

    .tab .tab-count {
      display: inline-block;
      background: var(--lavender);
      color: var(--lavender-deep);
      border-radius: 10px;
      font-size: 0.68rem;
      padding: 1px 6px;
      margin-left: 4px;
    }

    .tab.active .tab-count {
      background: var(--lavender-deep);
      color: white;
    }

    .tab .tab-errors {
      display: inline-block;
      background: var(--red-alert);
      color: var(--red-alert-text);
      border-radius: 10px;
      font-size: 0.68rem;
      padding: 1px 6px;
      margin-left: 3px;
    }

    /* ── Last updated ── */
    .last-updated {
      font-size: 0.72rem;
      color: var(--text-light);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
    }

    .toolbar-info {
      font-size: 0.78rem;
      color: var(--text-muted);
      flex: 1;
    }

    .toolbar-info strong { color: var(--text); }

    .toolbar-info .filter-active {
      color: var(--lavender-deep);
      font-weight: 500;
    }

    .page-size-select {
      background: rgba(255,252,254,0.9);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.35rem 0.6rem;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .btn-icon {
      background: rgba(255,252,254,0.9);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .btn-icon:hover { background: white; color: var(--text); border-color: var(--lavender-mid); }
    .btn-icon.active { background: var(--lavender); border-color: var(--lavender-deep); color: var(--lavender-deep); }

    /* ── Log table ── */
    .log-table-wrap {
      background: rgba(255,252,254,0.82);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;   /* horizontal scroll on mobile */
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 2px 20px var(--shadow);
      animation: fadeUp 0.3s ease;
    }

    .log-table-wrap table {
      min-width: 480px;   /* prevents columns collapsing too narrow */
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead tr.col-headers {
      background: rgba(237,232,245,0.55);
    }

    thead tr.col-filters {
      background: rgba(237,232,245,0.3);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.7rem 0.9rem;
      text-align: left;
      font-weight: 500;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ── Per-column filter inputs ── */
    .col-filter-cell {
      padding: 0.35rem 0.5rem;
    }

    .col-filter-input {
      width: 100%;
      background: rgba(255,252,254,0.8);
      border: 1.5px solid transparent;
      border-radius: 6px;
      color: var(--text);
      padding: 0.28rem 0.5rem;
      font-size: 0.74rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      min-width: 60px;
    }

    .col-filter-input:focus { border-color: var(--lavender-mid); background: white; }
    .col-filter-input::placeholder { color: var(--text-light); font-size: 0.7rem; }
    .col-filter-input.has-value { border-color: var(--lavender-deep); background: var(--lavender); }

    td {
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid rgba(200,180,220,0.12);
      color: var(--text);
      vertical-align: middle;
      line-height: 1.4;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; cursor: pointer; }
    tbody tr:hover { background: rgba(237,232,245,0.3); }
    tbody tr.expanded { background: rgba(237,232,245,0.25); }

    .td-datetime {
      white-space: nowrap;
      color: var(--text-muted);
      font-size: 0.75rem;
      min-width: 140px;
    }

    .td-date { display: block; color: var(--text); font-weight: 500; }
    .td-time { display: block; color: var(--text-light); font-size: 0.7rem; }

    .td-url {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.74rem;
      color: var(--sky-deep);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 500;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .badge-matched    { background: var(--green-alert); color: var(--green-alert-text); }
    .badge-notmatched { background: var(--red-alert);   color: var(--red-alert-text); }
    .badge-site       { background: var(--lavender);    color: var(--lavender-deep); }
    .badge-error      { background: #f8e8d8; color: #906030; }

    .price-val    { font-family: 'DM Sans', monospace; font-weight: 500; }
    .price-target { color: var(--text-muted); font-size: 0.75rem; }

    tr.row-deal td { background: rgba(216,240,224,0.45); }
    tr.row-deal:hover td { background: rgba(216,240,224,0.65); }
    tr.row-deal .price-val { color: var(--green-alert-text); }

    /* ── Expand row ── */
    tr.expand-row td {
      padding: 0;
      border-bottom: 1px solid var(--border);
      cursor: default;
    }

    .expand-content {
      background: rgba(237,232,245,0.18);
      padding: 0.9rem 1.2rem;
      font-size: 0.8rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem 1.5rem;
    }

    .expand-field { display: flex; flex-direction: column; gap: 2px; }
    .expand-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); }
    .expand-value { color: var(--text); word-break: break-all; }

    /* ── Highlight matched text ── */
    mark {
      background: rgba(96,72,160,0.18);
      color: var(--lavender-deep);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .pg-btn {
      min-width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: rgba(255,252,254,0.9);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center;
    }

    .pg-btn:hover { background: white; color: var(--text); border-color: var(--lavender-mid); }
    .pg-btn.active { background: var(--lavender-deep); color: white; border-color: var(--lavender-deep); }
    .pg-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Empty / error / states ── */
    .state-msg {
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--text-muted);
    }

    .state-msg .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-msg p { font-size: 0.85rem; line-height: 1.6; }

    .error-banner {
      background: var(--red-alert);
      border: 1px solid var(--red-alert-border);
      color: var(--red-alert-text);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    /* ── Auto-refresh countdown ── */
    .refresh-countdown {
      font-size: 0.7rem;
      color: var(--text-light);
      white-space: nowrap;
    }

    .skeleton td {
      background: linear-gradient(90deg, rgba(200,180,220,0.12) 25%, rgba(200,180,220,0.22) 50%, rgba(200,180,220,0.12) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      color: transparent;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 640px) {
      .td-url { max-width: 140px; }
      th, td { padding: 0.5rem 0.6rem; }
      .toolbar { flex-direction: column; align-items: flex-start; }
      .global-search-wrap { max-width: 100%; }
      .header-right { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="app-title">AutoLog<span>Reader</span></div>
  <div class="header-right">
    <div class="global-search-wrap">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="var(--text)"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
      <input type="text" id="globalSearch" placeholder="Search all columns…" oninput="onGlobalSearch()" autocomplete="off"/>
    </div>
    <div class="header-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">ready</span>
    </div>
  </div>
</header>

<main id="app">
  <!-- Setup card (fallback if secrets not injected) -->
  <div class="setup-card" id="setupCard" style="display:none">
    <h2>Connect to tel-auto</h2>
    <p>Enter your GitHub credentials to start reading logs from your private repository.</p>
    <div class="field-label">GitHub Username</div>
    <input type="text" id="cfgOwner" placeholder="your-username"/>
    <div class="field-label">Personal Access Token</div>
    <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>
    <button class="btn-primary" onclick="saveConfig()">Connect →</button>
  </div>

  <!-- Log viewer -->
  <div id="viewer" style="display:none">
    <div id="errorBanner" class="error-banner" style="display:none"></div>

    <div class="tabs" id="tabs">
      <span class="last-updated" id="lastUpdated"></span>
    </div>

    <div class="toolbar">
      <div class="toolbar-info" id="toolbarInfo"></div>
      <span class="refresh-countdown" id="refreshCountdown"></span>
      <button class="btn-icon" id="exportBtn" onclick="exportCSV()" title="Export filtered view as CSV">↓ CSV</button>
      <button class="btn-icon" onclick="refreshCurrent()">↺ Refresh</button>
      <select class="page-size-select" id="pageSizeSelect" onchange="onPageSizeChange()">
        <option value="20" selected>20 / page</option>
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
        <option value="999999">All</option>
      </select>
    </div>

    <div class="log-table-wrap" id="tableWrap"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const CONFIG = {
  owner:  '__GH_OWNER__',
  repo:   'tel-auto',
  branch: 'main',
  token:  '__GH_TOKEN__',
};

const AUTO_REFRESH_MS = 10 * 60 * 1000; // 10 minutes

// ══════════════════════════════════════════════
//  FILE PARSERS
//  Add new log files here — one entry per file.
// ══════════════════════════════════════════════
const FILE_PARSERS = {

  'cardyard_debug.log': {
    label: '🃏 Cardyard',
    color: 'rose',
    parse(raw) {
      return raw.trim().split('\n').reverse().map((line, i) => {
        // Format A: [datetime] site: Title, Price=X, Discount=Y, Target=Z[, Alert Sent]
        const mFull = line.match(/^\[(.+?)\]\s+(\S+?):\s+(.+?),\s*Price=([\d.]+),\s*Discount=([\d.]+),\s*Target=([\d.]+)(,\s*Alert Sent)?\s*$/i);
        if (mFull) {
          return {
            id: i,
            datetime:  mFull[1],
            site:      mFull[2].replace(':','').trim(),
            desc:      mFull[3].trim(),
            price:     parseFloat(mFull[4]),
            discount:  parseFloat(mFull[5]),
            target:    parseFloat(mFull[6]),
            alerted:   !!mFull[7],
            type:      'card',
            _raw: line,
          };
        }
        // Format B: [datetime] site: simple message (e.g. "not found", "found N cards")
        const mSimple = line.match(/^\[(.+?)\]\s+(\S+?):\s+(.+)$/);
        if (mSimple) {
          return {
            id: i,
            datetime: mSimple[1],
            site:     mSimple[2].replace(':','').trim(),
            desc:     mSimple[3].trim(),
            price:    null,
            discount: null,
            target:   null,
            alerted:  false,
            type:     'simple',
            _raw: line,
          };
        }
        return null;
      }).filter(Boolean);
    },
    columns: [
      { key: 'datetime', label: 'Date / Time', render: (r,q,cf) => dtCell(r.datetime, q||cf.datetime) },
      { key: 'site',     label: 'Site',        render: (r,q,cf) => `<span class="badge badge-site">${highlight(esc(r.site), q||cf.site)}</span>` },
      { key: 'desc',     label: 'Result',      render: (r,q,cf) => {
        const isNotFound = r.type === 'simple';
        const txt = highlight(esc(r.desc), q||cf.desc);
        if (isNotFound) return `<span class="badge badge-error">${txt}</span>`;
        if (r.alerted)  return `<span style="font-weight:500">${txt}</span>`;
        return txt;
      }},
      { key: 'price',    label: 'Price',       render: (r,q,cf) => {
        if (r.price === null) return '<span style="color:var(--text-light)">—</span>';
        return `<span class="price-val">${highlight('£'+r.price.toFixed(2), q||cf.price)}</span>`;
      }},
      { key: 'discount', label: 'Discount',    render: (r,q,cf) => {
        if (r.discount === null) return '<span style="color:var(--text-light)">—</span>';
        return highlight(r.discount + '%', q||cf.discount);
      }},
      { key: 'target',   label: 'Target',      render: (r,q,cf) => {
        if (r.target === null) return '<span style="color:var(--text-light)">—</span>';
        return `<span class="price-target">${highlight(r.target + '%', q||cf.target)}</span>`;
      }},
      { key: 'alerted',  label: 'Alert',       render: (r) => {
        if (r.type === 'simple') return '';
        return r.alerted
          ? `<span class="badge badge-matched">✓ Sent</span>`
          : `<span style="color:var(--text-light);font-size:0.72rem">—</span>`;
      }},
    ],
    expandFields: r => r.type === 'simple' ? [
      { label: 'Date / Time', value: r.datetime },
      { label: 'Site',        value: r.site },
      { label: 'Result',      value: r.desc },
    ] : [
      { label: 'Date / Time', value: r.datetime },
      { label: 'Site',        value: r.site },
      { label: 'Item',        value: r.desc },
      { label: 'Price',       value: '£' + r.price.toFixed(2) },
      { label: 'Discount',    value: r.discount + '%' },
      { label: 'Target',      value: r.target + '%' },
      { label: 'Alert Sent',  value: r.alerted ? 'Yes' : 'No' },
    ],
    // Highlight row when discount > target
    rowClass: r => (r.discount !== null && r.target !== null && r.discount > r.target) ? 'row-deal' : '',
    errorCount: rows => rows.filter(r => r.type === 'simple').length,
  },

  'keyword_debug.log': {
    label: '🔍 Keywords',
    color: 'sky',
    parse(raw) {
      return raw.trim().split('\n').reverse().map((line, i) => {
        const m = line.match(/^\[(.+?)\]\s+(https?:\/\/\S+):\s+keyword\s+(MATCHED|NOT matched)\s+->\s+(.+)$/i);
        if (!m) return null;
        return { id: i, datetime: m[1], url: m[2], status: m[3].toUpperCase(), keyword: m[4].trim(), _raw: line };
      }).filter(Boolean);
    },
    columns: [
      { key: 'datetime', label: 'Date / Time', render: (r,q,cf) => dtCell(r.datetime, q||cf.datetime) },
      { key: 'url',      label: 'URL',         render: (r,q,cf) => `<span class="td-url" title="${esc(r.url)}">${highlight(esc(shortUrl(r.url)), q||cf.url)}</span>` },
      { key: 'keyword',  label: 'Keyword',     render: (r,q,cf) => `<strong>${highlight(esc(r.keyword), q||cf.keyword)}</strong>` },
      { key: 'status',   label: 'Status',      render: (r,q,cf) => r.status === 'MATCHED'
          ? `<span class="badge badge-matched">✓ ${highlight('Matched', q||cf.status)}</span>`
          : `<span class="badge badge-notmatched">✗ ${highlight('Not matched', q||cf.status)}</span>` },
    ],
    expandFields: r => [
      { label: 'Date / Time', value: r.datetime },
      { label: 'Full URL',    value: r.url },
      { label: 'Keyword',     value: r.keyword },
      { label: 'Status',      value: r.status },
    ],
    rowClass: () => '',
    errorCount: () => 0,
  },

  'price_debug.log': {
    label: '💰 Prices',
    color: 'mint',
    parse(raw) {
      return raw.trim().split('\n').reverse().map((line, i) => {
        const m = line.match(/^\[(.+?)\]\s+(https?:\/\/\S+):\s+fetched price=([\d.]+),\s*last=([\d.]+),\s*target=([\d.]+)/);
        if (!m) return null;
        return {
          id: i,
          datetime: m[1],
          url: m[2],
          fetched: parseFloat(m[3]),
          last:    parseFloat(m[4]),
          target:  parseFloat(m[5]),
          _raw: line,
        };
      }).filter(Boolean);
    },
    columns: [
      { key: 'datetime', label: 'Date / Time', render: (r,q,cf) => dtCell(r.datetime, q||cf.datetime) },
      { key: 'url',      label: 'Item',        render: (r,q,cf) => `<span class="td-url" title="${esc(r.url)}">${highlight(esc(productName(r.url)), q||cf.url)}</span>` },
      { key: 'fetched',  label: 'Fetched',     render: (r,q,cf) => `<span class="price-val">${highlight('£'+r.fetched.toFixed(2), q||cf.fetched)}</span>` },
      { key: 'target',   label: 'Target',      render: (r,q,cf) => `<span class="price-target">${highlight('£'+r.target.toFixed(2), q||cf.target)}</span>` },
      { key: 'diff',     label: 'vs Target',   render: (r) => {
        const diff = r.fetched - r.target;
        const sign = diff >= 0 ? '+' : '';
        const cls  = diff < 0 ? 'color:var(--green-alert-text)' : 'color:var(--text-muted)';
        return `<span style="${cls};font-weight:500">${sign}£${Math.abs(diff).toFixed(2)}</span>`;
      }},
    ],
    expandFields: r => [
      { label: 'Date / Time',  value: r.datetime },
      { label: 'Full URL',     value: r.url },
      { label: 'Fetched',      value: '£' + r.fetched.toFixed(2) },
      { label: 'Last',         value: '£' + r.last.toFixed(2) },
      { label: 'Target',       value: '£' + r.target.toFixed(2) },
      { label: 'vs Target',    value: (r.fetched < r.target ? '▼ Below target' : '▲ Above target') },
    ],
    rowClass: r => r.fetched < r.target ? 'row-deal' : '',
    errorCount: () => 0,
  },
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let state = {
  files:        [],
  activeFile:   null,
  rows:         [],       // all parsed rows
  filteredRows: [],       // after global + column filters
  page:         1,
  pageSize:     20,
  globalQuery:  '',
  colFilters:   {},       // { colKey: string }
  expandedRow:  null,     // row id currently expanded
  lastFetched:  null,
  refreshTimer: null,
  countdownTimer: null,
  countdownSecs:  0,
};

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const tokenInjected = CONFIG.token && CONFIG.token.startsWith('ghp_');
  if (!tokenInjected) {
    document.getElementById('setupCard').style.display = 'block';
  } else {
    document.getElementById('viewer').style.display = 'block';
    loadFileList();
    startAutoRefresh();
  }
});

function saveConfig() {
  const o = document.getElementById('cfgOwner').value.trim();
  const t = document.getElementById('cfgToken').value.trim();
  if (!o || !t) { alert('Please fill in both fields.'); return; }
  CONFIG.owner = o;
  CONFIG.token = t;
  document.getElementById('setupCard').style.display = 'none';
  document.getElementById('viewer').style.display = 'block';
  loadFileList();
  startAutoRefresh();
}

// ══════════════════════════════════════════════
//  AUTO-REFRESH
// ══════════════════════════════════════════════
function startAutoRefresh() {
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  if (state.countdownTimer) clearInterval(state.countdownTimer);

  state.refreshTimer = setInterval(() => {
    if (state.activeFile) loadFile(state.activeFile);
  }, AUTO_REFRESH_MS);

  startCountdown();
}

function startCountdown() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownSecs = AUTO_REFRESH_MS / 1000;
  updateCountdownDisplay();
  state.countdownTimer = setInterval(() => {
    state.countdownSecs--;
    if (state.countdownSecs <= 0) {
      state.countdownSecs = AUTO_REFRESH_MS / 1000;
    }
    updateCountdownDisplay();
  }, 1000);
}

function updateCountdownDisplay() {
  const el = document.getElementById('refreshCountdown');
  if (!el) return;
  const m = Math.floor(state.countdownSecs / 60);
  const s = state.countdownSecs % 60;
  el.textContent = `↺ ${m}:${String(s).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════
//  GITHUB API
// ══════════════════════════════════════════════
async function ghFetch(endpoint) {
  const res = await fetch(`https://api.github.com${endpoint}`, {
    headers: {
      'Authorization': `token ${CONFIG.token}`,
      'Accept': 'application/vnd.github.v3+json',
    }
  });
  if (!res.ok) {
    const b = await res.json().catch(() => ({}));
    throw new Error(`GitHub API ${res.status}: ${b.message || res.statusText}`);
  }
  return res.json();
}

async function loadFileList() {
  setStatus('loading', 'loading…');
  hideError();
  try {
    const items = await ghFetch(`/repos/${CONFIG.owner}/${CONFIG.repo}/contents/?ref=${CONFIG.branch}`);
    state.files = items
      .filter(f => f.type === 'file' && FILE_PARSERS[f.name])
      .map(f => ({ name: f.name, sha: f.sha }));

    if (state.files.length === 0) {
      showError('No recognised log files found in the repo root.');
      setStatus('error', 'no files');
      return;
    }

    renderTabs();
    selectFile(state.files[0].name);
    setStatus('ok', `${state.files.length} files`);
  } catch (err) {
    showError(err.message);
    setStatus('error', 'error');
  }
}

async function loadFile(name) {
  setStatus('loading', 'loading…');
  hideError();
  renderSkeleton();
  try {
    const data = await ghFetch(`/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${name}?ref=${CONFIG.branch}`);
    const raw = atob(data.content.replace(/\n/g, ''));
    const parser = FILE_PARSERS[name];
    state.rows = parser.parse(raw);
    state.lastFetched = new Date();
    state.expandedRow = null;
    applyFilters();
    renderTable();
    updateLastUpdated();
    setStatus('ok', 'loaded');
    startCountdown();
  } catch (err) {
    showError(err.message);
    setStatus('error', 'error');
    document.getElementById('tableWrap').innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠️</div>
        <p>${esc(err.message)}</p>
      </div>`;
  }
}

// ══════════════════════════════════════════════
//  FILTERING
// ══════════════════════════════════════════════
function applyFilters() {
  const gq = state.globalQuery.toLowerCase().trim();
  const cf = state.colFilters;

  state.filteredRows = state.rows.filter(r => {
    // Global search — check raw line
    if (gq && !r._raw.toLowerCase().includes(gq)) return false;

    // Per-column filters
    const parser = FILE_PARSERS[state.activeFile];
    for (const col of parser.columns) {
      const fv = (cf[col.key] || '').toLowerCase().trim();
      if (!fv) continue;
      // Get a plain-text version of this field for matching
      const fieldVal = getFieldText(r, col.key).toLowerCase();
      if (!fieldVal.includes(fv)) return false;
    }
    return true;
  });

  state.page = 1;
}

function getFieldText(r, key) {
  // Returns plain text for a field key — used for filtering
  switch(key) {
    case 'datetime': return r.datetime || '';
    case 'site':     return r.site || '';
    case 'desc':     return r.desc || '';
    case 'url':      return (r.url || '') + ' ' + productName(r.url || '');
    case 'keyword':  return r.keyword || '';
    case 'status':   return r.status || '';
    case 'fetched':  return r.fetched !== undefined ? '£'+r.fetched.toFixed(2) : '';
    case 'target':   return r.target  !== undefined
                       ? (r.price !== undefined ? r.target+'%' : '£'+r.target.toFixed(2))
                       : '';
    case 'diff':     return r.fetched !== undefined ? String(r.fetched - r.target) : '';
    case 'price':    return r.price    !== null && r.price    !== undefined ? '£'+r.price.toFixed(2) : '';
    case 'discount': return r.discount !== null && r.discount !== undefined ? r.discount+'%' : '';
    case 'alerted':  return r.alerted ? 'sent' : '';
    default:         return '';
  }
}

function onGlobalSearch() {
  state.globalQuery = document.getElementById('globalSearch').value;
  applyFilters();
  renderTable();
}

function onColFilter(key, value) {
  state.colFilters[key] = value;
  // Style the input
  const inp = document.getElementById('cf-' + key);
  if (inp) inp.classList.toggle('has-value', value.trim().length > 0);
  applyFilters();
  renderTable();
}

function clearAllFilters() {
  state.globalQuery = '';
  state.colFilters = {};
  document.getElementById('globalSearch').value = '';
  document.querySelectorAll('.col-filter-input').forEach(i => {
    i.value = '';
    i.classList.remove('has-value');
  });
  applyFilters();
  renderTable();
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const lu = document.getElementById('lastUpdated');

  const tabsHtml = state.files.map(f => {
    const parser = FILE_PARSERS[f.name];
    return `<button class="tab" id="tab-${f.name}" onclick="selectFile('${f.name}')">${parser.label}</button>`;
  }).join('');

  tabsEl.innerHTML = tabsHtml;
  tabsEl.appendChild(lu);
}

function selectFile(name) {
  state.activeFile = name;
  state.colFilters = {};   // reset column filters per-file (they are file-specific)
  state.expandedRow = null;
  // global search intentionally preserved across file switches

  state.files.forEach(f => {
    const el = document.getElementById(`tab-${f.name}`);
    if (el) el.classList.toggle('active', f.name === name);
  });
  loadFile(name);
}

function renderTable() {
  const parser   = FILE_PARSERS[state.activeFile];
  const rows     = state.filteredRows;
  const allRows  = state.rows;
  const total    = rows.length;
  const ps       = state.pageSize;
  const page     = state.page;
  const start    = (page - 1) * ps;
  const end      = Math.min(start + ps, total);
  const slice    = rows.slice(start, end);
  const gq       = state.globalQuery;
  const cf       = state.colFilters;
  const isFiltered = gq.trim() || Object.values(cf).some(v => v.trim());

  // Update tab: count + error badge
  const tabEl = document.getElementById(`tab-${state.activeFile}`);
  if (tabEl) {
    const errCount = parser.errorCount(allRows);
    const errBadge = errCount > 0 ? `<span class="tab-errors">${errCount} err</span>` : '';
    tabEl.innerHTML = `${parser.label} <span class="tab-count">${isFiltered ? total+'/'+allRows.length : total}</span>${errBadge}`;
  }

  // Toolbar info
  const filterNote = isFiltered
    ? ` <span class="filter-active">(filtered from ${allRows.length}) <a href="#" onclick="clearAllFilters();return false;" style="color:var(--rose-deep);text-decoration:none">✕ clear</a></span>`
    : '';
  document.getElementById('toolbarInfo').innerHTML =
    total === 0
      ? `<span>No entries match your filter</span>${filterNote}`
      : `Showing <strong>${start+1}–${end}</strong> of <strong>${total}</strong>${filterNote}`;

  // Column filter inputs row
  const filterRow = `<tr class="col-filters">${
    parser.columns.map(c =>
      `<td class="col-filter-cell">
        <input class="col-filter-input${(cf[c.key]||'').trim() ? ' has-value' : ''}"
          id="cf-${c.key}"
          type="text"
          placeholder="${c.label}…"
          value="${esc(cf[c.key]||'')}"
          data-colkey="${c.key}"
          onkeydown="event.stopPropagation()"
          autocomplete="off"/>
      </td>`
    ).join('')
  }</tr>`;

  // Table header
  const thead = `
    <thead>
      <tr class="col-headers">${parser.columns.map(c => `<th>${c.label}</th>`).join('')}</tr>
      ${filterRow}
    </thead>`;

  // Rows
  let tbody = '';
  if (slice.length === 0) {
    tbody = `<tr><td colspan="${parser.columns.length}">
      <div class="state-msg"><div class="icon">🔍</div><p>No entries match your search.</p></div>
    </td></tr>`;
  } else {
    slice.forEach(r => {
      const cls = parser.rowClass(r);
      const isExp = state.expandedRow === r.id;
      const cells = parser.columns.map(c => `<td>${c.render(r, gq, cf)}</td>`).join('');
      tbody += `<tr class="${cls}${isExp?' expanded':''}" onclick="toggleExpand(${r.id})">${cells}</tr>`;

      if (isExp) {
        const fields = parser.expandFields(r);
        const fieldsHtml = fields.map(f =>
          `<div class="expand-field">
            <span class="expand-label">${esc(f.label)}</span>
            <span class="expand-value">${esc(f.value)}</span>
          </div>`
        ).join('');
        tbody += `<tr class="expand-row"><td colspan="${parser.columns.length}">
          <div class="expand-content">${fieldsHtml}</div>
        </td></tr>`;
      }
    });
  }

  document.getElementById('tableWrap').innerHTML =
    `<table>${thead}<tbody>${tbody}</tbody></table>`;

  // Attach column filter listeners without losing focus on re-render
  attachColFilterListeners();
  renderPagination(total, ps, page);
}

function attachColFilterListeners() {
  const active = document.activeElement;
  const activeKey = active && active.dataset && active.dataset.colkey;

  document.querySelectorAll('.col-filter-input').forEach(inp => {
    inp.addEventListener('input', function() {
      // Save cursor position before re-render
      const key = this.dataset.colkey;
      const pos = this.selectionStart;
      onColFilter(key, this.value);
      // Re-focus and restore cursor after re-render
      const restored = document.getElementById('cf-' + key);
      if (restored) {
        restored.focus();
        try { restored.setSelectionRange(pos, pos); } catch(e) {}
      }
    });
  });

  // Restore focus if it was on a filter input before re-render
  if (activeKey) {
    const el = document.getElementById('cf-' + activeKey);
    if (el) el.focus();
  }
}

function toggleExpand(id) {
  state.expandedRow = state.expandedRow === id ? null : id;
  renderTable();
}

function updateLastUpdated() {
  const el = document.getElementById('lastUpdated');
  if (!el || !state.lastFetched) return;
  const t = state.lastFetched;
  const hh = String(t.getHours()).padStart(2,'0');
  const mm = String(t.getMinutes()).padStart(2,'0');
  const ss = String(t.getSeconds()).padStart(2,'0');
  el.textContent = `Updated ${hh}:${mm}:${ss}`;
}

function renderPagination(total, ps, current) {
  const pages = Math.ceil(total / ps);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button class="pg-btn" onclick="goPage(${current-1})" ${current===1?'disabled':''}>‹</button>`;
  const range = pageRange(current, pages);
  let prev = null;
  range.forEach(p => {
    if (prev !== null && p - prev > 1) html += `<span class="pg-btn" style="border:none;cursor:default">…</span>`;
    html += `<button class="pg-btn ${p===current?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="pg-btn" onclick="goPage(${current+1})" ${current===pages?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function pageRange(current, total) {
  const delta = 2;
  const range = new Set([1, total]);
  for (let i = Math.max(2, current-delta); i <= Math.min(total-1, current+delta); i++) range.add(i);
  return Array.from(range).sort((a,b) => a-b);
}

function renderSkeleton() {
  const parser = FILE_PARSERS[state.activeFile];
  if (!parser) return;
  const thead = `<thead><tr class="col-headers">${parser.columns.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>`;
  const rows  = Array(8).fill(0).map(() =>
    `<tr class="skeleton">${parser.columns.map(()=>'<td>████████</td>').join('')}</tr>`
  ).join('');
  document.getElementById('tableWrap').innerHTML =
    `<table>${thead}<tbody>${rows}</tbody></table>`;
  document.getElementById('pagination').innerHTML = '';
}

// ══════════════════════════════════════════════
//  CSV EXPORT
// ══════════════════════════════════════════════
function exportCSV() {
  const parser = FILE_PARSERS[state.activeFile];
  if (!parser || state.filteredRows.length === 0) return;

  const headers = parser.columns.map(c => csvCell(c.label));
  const rowsData = state.filteredRows.map(r =>
    parser.columns.map(c => csvCell(getFieldText(r, c.key)))
  );

  const csv = [headers, ...rowsData].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${state.activeFile.replace('.log','')}_export.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function csvCell(val) {
  const s = String(val ?? '');
  return s.includes(',') || s.includes('"') || s.includes('\n')
    ? `"${s.replace(/"/g, '""')}"`
    : s;
}

// ══════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════
function goPage(p) {
  const pages = Math.ceil(state.filteredRows.length / state.pageSize);
  if (p < 1 || p > pages) return;
  state.page = p;
  state.expandedRow = null;
  renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function onPageSizeChange() {
  state.pageSize = parseInt(document.getElementById('pageSizeSelect').value);
  state.page = 1;
  renderTable();
}

function refreshCurrent() {
  if (state.activeFile) {
    loadFile(state.activeFile);
    startCountdown();
  }
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function highlight(text, query) {
  if (!query || !query.trim()) return text;
  const q = query.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
}

function dtCell(dt, query) {
  const [date, time] = dt.split(' ');
  return `<span class="td-datetime">
    <span class="td-date">${highlight(esc(date), query)}</span>
    <span class="td-time">${highlight(esc(time||''), query)}</span>
  </span>`;
}

function shortUrl(url) {
  try {
    const u = new URL(url);
    return u.hostname.replace('www.','') + u.pathname.slice(0,40);
  } catch { return url.slice(0,50); }
}

function productName(url) {
  try {
    const u = new URL(url);
    const parts = u.pathname.split('/').filter(Boolean);
    const slug = parts[parts.length - 1] || parts[parts.length - 2] || '';
    return slug.replace(/-[a-z0-9]{8,}$/, '').replace(/-/g, ' ') || shortUrl(url);
  } catch { return shortUrl(url); }
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
  document.getElementById('statusText').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}
