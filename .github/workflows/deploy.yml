name: Deploy AutoLogReader

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          GH_OWNER: ${{ secrets.GH_OWNER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sed -i "s|__GH_OWNER__|${GH_OWNER}|g" index.html
          sed -i "s|__GH_TOKEN__|${GH_TOKEN}|g" index.html

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
